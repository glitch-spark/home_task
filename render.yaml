# Render Blueprint — Creator Intake Review Agent
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: creator-intake-review
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: creator-intake-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: creator-intake-db
    plan: free
    databaseName: home_task
    user: home_task
